stages:
  - sonar

variables:
  SONAR_HOST_URL: "http://host.docker.internal:9000"
  SONAR_LOGIN: "${SONAR_TOKEN}"

sonar_scan:
  stage: sonar
  image: sonarsource/sonar-scanner-cli:11
  script:
    # Show scanner version (optional)
    - sonar-scanner --version

    # Run SonarQube analysis in a single line
    - sonar-scanner -Dsonar.projectKey=development7734933_go_template_v3_251ddc65-4c9a-485c-bd30-fc44c539c9713 -Dsonar.sources=. -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_LOGIN